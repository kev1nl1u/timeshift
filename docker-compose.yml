version: '3.8'

services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/timeshift.db
    networks:
      - timeshift-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - timeshift-net
    restart: unless-stopped

networks:
  timeshift-net:
    driver: bridge
